name: Build and Test (Advanced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-credentials:
    name: Verify GitHub Credentials
    runs-on: self-hosted
    steps:
      - name: Check GH_PAT token
        shell: powershell
        run: |
          $token = "${{ secrets.GH_PAT }}"
          if ([string]::IsNullOrEmpty($token)) {
            Write-Output "ERROR: GH_PAT secret is not set"
            exit 1
          }
          Write-Output "✓ GH_PAT token is configured"

  check-sdk:
    name: Check if SDK needs rebuild
    needs: verify-credentials
    runs-on: self-hosted
    outputs:
      needs-rebuild: ${{ steps.check.outputs.needs-rebuild }}
      configure-hash: ${{ steps.check.outputs.configure-hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Check SDK status
        id: check
        shell: powershell
        run: |
          $token = "${{ secrets.GH_PAT }}"
          $output = python configure.py --check-sdk --gh-token $token
          Write-Output $output
          
          foreach ($line in $output -split "`n") {
            if ($line -match "^([a-z-]+)=(.+)$") {
              $key = $matches[1]
              $value = $matches[2]
              Write-Output "$key=$value" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            }
          }

  build-sdk:
    name: Build SDK
    needs: [verify-credentials, check-sdk]
    if: needs.check-sdk.outputs.needs-rebuild == 'true'
    outputs:
      configure-hash: ${{ needs.check-sdk.outputs.configure-hash }}
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup MSVC Build Tools
        shell: powershell
        run: |
          & .github/scripts/init-msvc.ps1

      - name: Enable Windows long path support
        shell: powershell
        run: |
          try {
            # Enable Git long path support
            & git config --global core.longpaths true
            Write-Output "Git long path support enabled"
            
            # Enable Windows long path support in registry (if running with admin)
            # This is commented out as it requires admin, but Git long path should be sufficient
            # New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force
          } catch {
            Write-Output "Warning: Could not enable long path support: $_"
          }

      - name: Build SDK - All libraries (except OpenUSD for debugging)
        shell: cmd
        run: |
          REM Build SDK - All libraries
          echo Building SDK with all libraries
          python configure.py --all
          if %ERRORLEVEL% neq 0 (
            echo Build failed with error code %ERRORLEVEL%
            exit /b %ERRORLEVEL%
          )

      - name: Verify SDK build output
        shell: powershell
        run: |
          try {
            # Check if SDK directory exists and has some content
            $sdkExists = Test-Path -Path "SDK"
            $sdkFiles = 0
            if ($sdkExists) {
              $sdkFiles = (Get-ChildItem -Path "SDK" -Recurse -ErrorAction SilentlyContinue | Measure-Object).Count
            }
            
            Write-Output "SDK directory exists: $sdkExists"
            Write-Output "SDK files count: $sdkFiles"
            
            if (-not $sdkExists -or $sdkFiles -eq 0) {
              Write-Output "ERROR: SDK directory is empty or not found!"
              exit 1
            }
          } catch {
            Write-Error "Error verifying SDK: $_"
            exit 1
          }

      - name: Pack SDK
        shell: powershell
        run: |
          Write-Output "Packing SDK..."
          python configure.py --pack
          
          if (Test-Path -Path "SDK/SDK.zip") {
            $size = (Get-Item "SDK/SDK.zip").Length / 1GB
            Write-Output "SDK.zip packed successfully - Size: $([Math]::Round($size, 2)) GB"
          } else {
            Write-Output "ERROR: SDK.zip not created!"
            exit 1
          }

      - name: Store configure hash
        shell: powershell
        run: |
          try {
            $configureHash = (Get-FileHash configure.py).Hash
            $hashFile = "SDK/.configure_hash"
            if (-not (Test-Path -Path "SDK")) {
              New-Item -ItemType Directory -Path "SDK" -Force | Out-Null
            }
            $configureHash | Out-File -FilePath $hashFile -Encoding UTF8 -NoNewline
            Write-Output "Hash saved: $configureHash"
          } catch {
            Write-Error "Error storing hash: $_"
            exit 1
          }

      - name: Upload SDK for workflow
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: SDK/SDK.zip
          retention-days: 7

      - name: Upload SDK to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: SDK/SDK.zip
          tag_name: sdk-${{ needs.check-sdk.outputs.configure-hash }}
          body: "SDK build for configure.py hash: ${{ needs.check-sdk.outputs.configure-hash }}"
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
          token: ${{ secrets.GH_PAT }}

  restore-sdk:
    name: Restore or build SDK
    needs: [verify-credentials, check-sdk, build-sdk]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Download SDK from workflow artifact (if rebuilt)
        if: needs.check-sdk.outputs.needs-rebuild == 'true'
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: SDK/

      - name: Download SDK from GitHub Release (if not rebuilt)
        if: needs.check-sdk.outputs.needs-rebuild == 'false'
        shell: powershell
        run: |
          try {
            $configureHash = "${{ needs.check-sdk.outputs.configure-hash }}"
            $tagName = "sdk-$configureHash"
            $sdkZip = "SDK/SDK.zip"
            
            Write-Output "Attempting to download SDK from release with tag: $tagName"
            New-Item -ItemType Directory -Path "SDK" -Force -ErrorAction SilentlyContinue | Out-Null
            
            # Use GH CLI with personal token
            $env:GH_TOKEN = "${{ secrets.GH_PAT }}"
            & gh release download $tagName --repo ${{ github.repository }} -p "SDK.zip" -O $sdkZip
            
            if ($LASTEXITCODE -eq 0 -and (Test-Path -Path $sdkZip)) {
              $size = (Get-Item $sdkZip).Length / 1GB
              Write-Output "SDK downloaded successfully - Size: $([Math]::Round($size, 2)) GB"
            } else {
              Write-Output "WARNING: Failed to download SDK from Release, will use existing binaries if available"
            }
          } catch {
            Write-Output "WARNING: Download error - $_"
          }

      - name: Extract SDK
        shell: powershell
        run: |
          try {
            $sdkZip = "SDK/SDK.zip"
            if (Test-Path -Path $sdkZip) {
              Write-Output "Extracting SDK.zip to SDK/ directory..."
              # Extract to a temp folder first
              $tempExtract = "SDK/SDK_temp_extract"
              if (Test-Path $tempExtract) {
                Remove-Item $tempExtract -Recurse -Force
              }
              Expand-Archive -Path $sdkZip -DestinationPath $tempExtract -Force
              
              # Move all contents from temp folder to SDK/ (this preserves SDK structure)
              Get-ChildItem -Path $tempExtract -Force | ForEach-Object {
                if (Test-Path "SDK/$($_.Name)") {
                  Remove-Item "SDK/$($_.Name)" -Recurse -Force
                }
                Move-Item -Path $_.FullName -Destination "SDK/$($_.Name)" -Force
              }
              
              # Clean up temp folder
              Remove-Item $tempExtract -Force -ErrorAction SilentlyContinue
              
              Write-Output "SDK extracted successfully"
              Write-Output "SDK structure restored"
            } else {
              Write-Output "ERROR: SDK.zip not found"
              exit 1
            }
          } catch {
            Write-Error "Error extracting SDK: $_"
            exit 1
          }

      - name: Copy SDK to Binaries (for CMake build)
        shell: powershell
        run: |
          try {
            # The SDK folder should now be properly extracted
            # We need to copy the necessary parts to Binaries/ so CMake can find them
            
            $buildVariants = @("Debug", "Release")
            foreach ($variant in $buildVariants) {
              $binariesDir = "Binaries/$variant"
              if (-not (Test-Path $binariesDir)) {
                New-Item -ItemType Directory -Path $binariesDir -Force | Out-Null
              }
              
              # Copy bin, lib, plugin, libraries, resources folders from SDK
              $itemsToCopy = @("bin", "lib", "plugin", "libraries", "resources")
              foreach ($item in $itemsToCopy) {
                $srcPath = "SDK/$item"
                $dstPath = "$binariesDir/$item"
                if (Test-Path $srcPath) {
                  Write-Output "Copying SDK/$item to Binaries/$variant/"
                  if (Test-Path $dstPath) {
                    Remove-Item $dstPath -Recurse -Force
                  }
                  Copy-Item -Path $srcPath -Destination $dstPath -Recurse -Force
                }
              }
            }
            
            Write-Output "✓ SDK copied to Binaries/ for CMake build"
          } catch {
            Write-Error "Error copying SDK to Binaries: $_"
            exit 1
          }

  build-without-cuda:
    name: Build Project (No CUDA)
    needs: restore-sdk
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python from SDK
        shell: powershell
        run: |
          try {
            $sdkPythonExe = "SDK/python/python.exe"
            if (Test-Path -Path $sdkPythonExe) {
              Write-Output "Found Python in SDK: $sdkPythonExe"
              
              # Add SDK python to PATH
              $env:PATH = "$(Get-Item 'SDK/python').FullName;$env:PATH"
              Write-Output "Added SDK Python to PATH"
              
              # Verify Python works
              & $sdkPythonExe --version
              if ($LASTEXITCODE -ne 0) {
                Write-Output "ERROR: Python from SDK not working"
                exit 1
              }
              Write-Output "✓ Python from SDK is ready"
            } else {
              Write-Output "ERROR: Python not found in SDK at $sdkPythonExe"
              Write-Output "SDK contents:"
              Get-ChildItem -Path "SDK" -Force
              exit 1
            }
          } catch {
            Write-Error "Error setting up Python: $_"
            exit 1
          }

      - name: Install dependencies
        shell: powershell
        run: |
          try {
            $sdkPythonExe = "SDK/python/python.exe"
            $sdkPipExe = "SDK/python/Scripts/pip.exe"
            
            # Make sure Python is in PATH
            $env:PATH = "$(Get-Item 'SDK/python').FullName;$env:PATH"
            
            if (Test-Path -Path $sdkPipExe) {
              Write-Output "Using pip from SDK"
              & $sdkPipExe install --upgrade pip
              if (Test-Path -Path "requirements.txt") {
                & $sdkPipExe install -r requirements.txt
              }
            } else {
              Write-Output "WARNING: pip not found in SDK, trying python -m pip"
              & $sdkPythonExe -m pip install --upgrade pip
              if (Test-Path -Path "requirements.txt") {
                & $sdkPythonExe -m pip install -r requirements.txt
              }
            }
          } catch {
            Write-Error "Error installing dependencies: $_"
            exit 1
          }

      - name: Setup MSVC Build Tools
        shell: powershell
        run: |
          & .github/scripts/init-msvc.ps1

      - name: Configure CMake (No CUDA)
        shell: cmd
        run: |
          set buildDir=build_nocuda
          if exist "%buildDir%" (
            rmdir /s /q "%buildDir%"
          )
          mkdir "%buildDir%"
          cd /d "%buildDir%"
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_CUDA=OFF ^
            -DCMAKE_INSTALL_PREFIX="../install_nocuda" ^
            ..
          
          if %ERRORLEVEL% neq 0 (
            echo CMake configuration failed
            exit /b %ERRORLEVEL%
          )

      - name: Build (No CUDA)
        shell: cmd
        run: |
          cd /d build_nocuda
          cmake --build . --config Release -j
          if %ERRORLEVEL% neq 0 (
            echo Build failed
            exit /b %ERRORLEVEL%
          )

      - name: Install (No CUDA)
        shell: cmd
        run: |
          cd /d build_nocuda
          cmake --install .

      - name: Upload build artifacts (No CUDA)
        uses: actions/upload-artifact@v4
        with:
          name: project-build-nocuda
          path: install_nocuda/
          retention-days: 7

  build-with-cuda:
    name: Build Project (With CUDA)
    needs: restore-sdk
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python from SDK
        shell: powershell
        run: |
          try {
            $sdkPythonExe = "SDK/python/python.exe"
            if (Test-Path -Path $sdkPythonExe) {
              Write-Output "Found Python in SDK: $sdkPythonExe"
              
              # Add SDK python to PATH
              $env:PATH = "$(Get-Item 'SDK/python').FullName;$env:PATH"
              Write-Output "Added SDK Python to PATH"
              
              # Verify Python works
              & $sdkPythonExe --version
              if ($LASTEXITCODE -ne 0) {
                Write-Output "ERROR: Python from SDK not working"
                exit 1
              }
              Write-Output "✓ Python from SDK is ready"
            } else {
              Write-Output "ERROR: Python not found in SDK at $sdkPythonExe"
              Write-Output "SDK contents:"
              Get-ChildItem -Path "SDK" -Force
              exit 1
            }
          } catch {
            Write-Error "Error setting up Python: $_"
            exit 1
          }

      - name: Install dependencies
        shell: powershell
        run: |
          try {
            $sdkPythonExe = "SDK/python/python.exe"
            $sdkPipExe = "SDK/python/Scripts/pip.exe"
            
            # Make sure Python is in PATH
            $env:PATH = "$(Get-Item 'SDK/python').FullName;$env:PATH"
            
            if (Test-Path -Path $sdkPipExe) {
              Write-Output "Using pip from SDK"
              & $sdkPipExe install --upgrade pip
              if (Test-Path -Path "requirements.txt") {
                & $sdkPipExe install -r requirements.txt
              }
            } else {
              Write-Output "WARNING: pip not found in SDK, trying python -m pip"
              & $sdkPythonExe -m pip install --upgrade pip
              if (Test-Path -Path "requirements.txt") {
                & $sdkPythonExe -m pip install -r requirements.txt
              }
            }
          } catch {
            Write-Error "Error installing dependencies: $_"
            exit 1
          }

      - name: Check CUDA availability
        id: cuda-check
        shell: powershell
        run: |
          try {
            if (Test-Path -Env:CUDA_PATH) {
              Write-Output "cuda-available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "CUDA_PATH: $env:CUDA_PATH"
              & "$env:CUDA_PATH\bin\nvcc.exe" --version
            } else {
              Write-Output "cuda-available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "CUDA_PATH not found"
            }
          } catch {
            Write-Output "cuda-available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Output "CUDA check error: $_"
          }

      - name: Setup MSVC Build Tools
        shell: powershell
        run: |
          & .github/scripts/init-msvc.ps1

      - name: Configure CMake (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          set buildDir=build_cuda
          if exist "%buildDir%" (
            rmdir /s /q "%buildDir%"
          )
          mkdir "%buildDir%"
          cd /d "%buildDir%"
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES=75;86;89 ^
            -DCMAKE_INSTALL_PREFIX="../install_cuda" ^
            ..
          
          if %ERRORLEVEL% neq 0 (
            echo CMake configuration failed
            exit /b %ERRORLEVEL%
          )

      - name: Build (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          cd /d build_cuda
          cmake --build . --config Release -j
          if %ERRORLEVEL% neq 0 (
            echo Build failed
            exit /b %ERRORLEVEL%
          )

      - name: Install (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          cd /d build_cuda
          cmake --install .

      - name: CUDA not available
        if: steps.cuda-check.outputs.cuda-available == 'false'
        shell: powershell
        run: |
          Write-Output "CUDA is not available on this runner"
          Write-Output "Skipping CUDA build"

      - name: Upload build artifacts (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: project-build-cuda
          path: install_cuda/
          retention-days: 7

  summary:
    name: Build Summary
    needs: [build-without-cuda, build-with-cuda]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print summary
        shell: powershell
        run: |
          try {
            Write-Output ""
            Write-Output "======================================"
            Write-Output "           BUILD SUMMARY"
            Write-Output "======================================"
            Write-Output "No CUDA build: ${{ needs.build-without-cuda.result }}"
            Write-Output "CUDA build:    ${{ needs.build-with-cuda.result }}"
            Write-Output "======================================"
            Write-Output ""
            
            if ("${{ needs.build-without-cuda.result }}" -eq "success" -and "${{ needs.build-with-cuda.result }}" -eq "success") {
              Write-Output "✓ Both builds completed successfully"
              exit 0
            } else {
              Write-Output "✗ Some builds failed"
              exit 1
            }
          } catch {
            Write-Error "Error in summary: $_"
            exit 1
          }
